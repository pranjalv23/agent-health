name: Deploy

on:
  push:
    tags: ['v*']

jobs:
  deploy:
    uses: agent-hub-org/deploy/.github/workflows/reusable-deploy.yml@main
    with:
      agent_name: agent-health
      service_name: agent-health
    secrets:
      OCI_HOST: ${{ secrets.OCI_HOST }}
      OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
